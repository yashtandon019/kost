# This rule is not used by the project kost itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the kost.kost.dev.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: kost
    app.kubernetes.io/managed-by: kustomize
  name: kostconfig-editor-role
rules:
- apiGroups:
  - kost.kost.dev
  resources:
  - kostconfigs
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - kost.kost.dev
  resources:
  - kostconfigs/status
  verbs:
  - get
